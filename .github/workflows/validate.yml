name: Validate skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill catalog
        run: python3 scripts/validate_repo.py

      - name: Test deterministic routing
        run: |
          python3 skills/orchestrate-codex-agents/scripts/route_task.py \
            --kind write \
            --scope single \
            --risk medium \
            --validation independent \
            > /tmp/route.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("/tmp/route.json").read_text(encoding="utf-8"))
          assert result["initial_agent"] == "terra_builder"
          assert result["required_follow_up"] == "terra_reviewer"
          PY

      - name: Test handoff validation
        run: |
          printf '%s\n' \
            'STATUS: COMPLETE' \
            'RECOMMENDED_NEXT: none' \
            'REASON: validation completed' \
            'COMPLETED_WORK: checked the bounded task' \
            'EVIDENCE: command output' \
            'NEXT_SCOPE: none' \
            'RISK: low' \
            'VALIDATION: pass' \
            'FILES_TOUCHED: none' \
            | python3 skills/orchestrate-codex-agents/scripts/validate_handoff.py

      - name: Test installer idempotency
        run: |
          target="$(mktemp -d)"
          python3 skills/orchestrate-codex-agents/scripts/install.py --codex-home "$target"
          python3 skills/orchestrate-codex-agents/scripts/install.py --codex-home "$target" --dry-run

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify skills CLI discovery
        run: DISABLE_TELEMETRY=1 npx --yes skills@latest add . --list
