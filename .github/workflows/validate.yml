name: Validate skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill catalog
        run: python3 scripts/validate_repo.py

      - name: Test deterministic routing
        run: |
          python3 runtime/scripts/route_task.py \
            --kind write \
            --scope single \
            --risk medium \
            --validation independent \
            > /tmp/route.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("/tmp/route.json").read_text(encoding="utf-8"))
          assert result["initial_agent"] == "build"
          assert result["required_follow_up"] == "review"
          PY
          python3 runtime/scripts/route_task.py \
            --kind read \
            --flags security \
            > /tmp/hard-gate-route.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("/tmp/hard-gate-route.json").read_text(encoding="utf-8"))
          assert result["initial_agent"] == "orchestrator"
          assert result["hard_gate"] is True
          PY

      - name: Test handoff validation
        run: |
          printf '%s\n' \
            'STATUS: COMPLETE' \
            'RECOMMENDED_NEXT: none' \
            'REASON: validation completed' \
            'COMPLETED_WORK: checked the bounded task' \
            'EVIDENCE: command output' \
            'NEXT_SCOPE: none' \
            'RISK: low' \
            'VALIDATION: pass' \
            'FILES_TOUCHED: none' \
            | python3 runtime/scripts/validate_handoff.py
          printf '%s\n' \
            'STATUS: ESCALATE' \
            'RECOMMENDED_NEXT: orchestrator' \
            'REASON: root handoff requires root ownership' \
            'COMPLETED_WORK: collected evidence' \
            'EVIDENCE: command output' \
            'NEXT_SCOPE: resolve the security decision' \
            'RISK: high' \
            'VALIDATION: not_run' \
            'FILES_TOUCHED: none' \
            | python3 runtime/scripts/validate_handoff.py --json \
            > /tmp/root-handoff.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("/tmp/root-handoff.json").read_text(encoding="utf-8"))
          assert result["valid"] is True
          assert result["fields"]["RECOMMENDED_NEXT"] == "orchestrator"
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node.js dependencies
        working-directory: packages/codex-orchestration-cli
        run: npm ci

      - name: Verify generated Codex hook types
        working-directory: packages/codex-orchestration-cli
        run: npm run check:hook-types

      - name: Type-check orchestration package
        working-directory: packages/codex-orchestration-cli
        run: npm run typecheck

      - name: Test orchestration bootstrap
        working-directory: packages/codex-orchestration-cli
        run: npm test

      - name: Verify npm package metadata and contents
        working-directory: packages/codex-orchestration-cli
        run: |
          npm pkg fix
          git diff --exit-code -- package.json
          npm pack --dry-run

      - name: Verify skills CLI discovery
        run: DISABLE_TELEMETRY=1 npx --yes skills@latest add . --list
